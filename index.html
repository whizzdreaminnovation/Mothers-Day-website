<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Mother's Day 💖</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
overflow-x:hidden;
background:linear-gradient(135deg,#ffd6e8,#ffeef7,#e5d4ff,#d6e8ff);
background-size:400% 400%;
animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.floating{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:1;
}

.item{
position:absolute;
font-size:30px;
animation:fall linear infinite;
opacity:0.8;
}

@keyframes fall{
0%{
transform:translateY(-100px) rotate(0deg);
}
100%{
transform:translateY(110vh) rotate(360deg);
}
}

.gallery img{
width:100%;
height:380px;
object-fit:cover;
border-radius:28px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
transition:0.4s;
}

.gallery img:hover{
transform:scale(1.03);
}

.quiz-box{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
padding:40px;
border-radius:35px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.option-btn{
padding:16px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:bold;
background:#ffd4ea;
cursor:pointer;
transition:0.3s;
}

.option-btn:hover{
background:#ff9ac8;
transform:scale(1.03);
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:35px;
border-radius:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
z-index:1000;
max-width:500px;
text-align:center;
display:none;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{
transform:translate(-50%,-50%) scale(0.5);
opacity:0;
}
100%{
transform:translate(-50%,-50%) scale(1);
opacity:1;
}
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:none;
z-index:999;
}

.glow{
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
text-shadow:0 0 10px #ff6fa5;
}
to{
text-shadow:0 0 25px #ff0080;
}
}

</style>
</head>

<body>

<!-- Floating Hearts & Flowers -->

<div class="floating" id="floating"></div>

<!-- Popup -->

<div class="overlay" id="overlay"></div>

<div class="popup" id="popup">

<h2 style="font-size:40px;color:#e91e63;margin-bottom:20px">
💌 Surprise 💌
</h2>

<p style="font-size:22px;line-height:1.8;color:#444">
Mom, thank you for every sacrifice, every smile, and every moment of love ❤️<br><br>

You are the strongest and kindest person in our lives.<br><br>

Happy Mother’s Day 🌸
</p>

<button onclick="closePopup()"
style="
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:20px;
background:#ff5fa2;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
">
Close 💖
</button>

</div>

<div style="max-width:1200px;margin:auto;padding:30px;position:relative;z-index:10">

<h1 class="glow"
style="
text-align:center;
font-size:70px;
color:#e91e63;
font-weight:900;
margin-bottom:20px;
">
Happy Mother’s Day 💖
</h1>

<p style="
text-align:center;
font-size:24px;
color:#444;
margin-bottom:50px;
">
Made with endless love for the most amazing mom ❤️
</p>

<!-- Gallery -->

<div class="gallery"
style="
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-bottom:60px;
">

<img src="image 1.jpeg">
<img src="image 2.jpeg">
<img src="image 3.jpeg">
<img src="image 4.jpeg">

</div>

<!-- Quiz -->

<div class="quiz-box">

<h2 style="
text-align:center;
font-size:45px;
color:#e91e63;
margin-bottom:35px;
">
Mom Quiz 🎀
</h2>

<div id="quiz"></div>

</div>

<div style="
text-align:center;
margin-top:50px;
font-size:22px;
color:#555;
font-weight:bold;
">
Made with endless love ❤️
</div>

</div>

<script>

/* Floating Items */

const floating = document.getElementById("floating");

const symbols = ["❤️","💖","🌸","💕","💐","🌷"];

for(let i=0;i<40;i++){

const item = document.createElement("div");

item.className = "item";

item.innerHTML = symbols[Math.floor(Math.random()*symbols.length)];

item.style.left = Math.random()*100 + "%";

item.style.animationDuration = (5 + Math.random()*8) + "s";

item.style.fontSize = (20 + Math.random()*25) + "px";

item.style.animationDelay = Math.random()*5 + "s";

floating.appendChild(item);

}

/* Quiz */

const questions = [

{
question:"What is Mom's favorite fruit? 🍉",
options:["Mango","Watermelon","Apple","Strawberry"],
answer:"Mango"
},

{
question:"Mom's favorite country? ✈️",
options:["Switzerland","Sweden","Spain","Norway"],
answer:"Switzerland"
},

{
question:"Who loves Mom the most? ❤️",
options:["Mom","Dad","Sister Heera","All of the above"],
answer:"All of the above"
}

];

let currentQuestion = 0;
let score = 0;

function loadQuestion(){

if(currentQuestion >= questions.length){

celebrate();

document.getElementById("quiz").innerHTML = `

<div style="text-align:center">

<h2 style="
font-size:55px;
color:#e91e63;
margin-bottom:20px;
">
🎉 You Finished 🎉
</h2>

<p style="
font-size:28px;
margin-bottom:20px;
">
Score: ${score}/3
</p>

<p style="
font-size:24px;
line-height:1.8;
color:#444;
">
Mom, you make every place feel like home ❤️<br><br>

Your love, strength, and care mean everything.<br><br>

Happy Mother’s Day 🌸
</p>

<button onclick="showPopup()"
style="
margin-top:30px;
padding:18px 35px;
border:none;
border-radius:25px;
background:#ff5fa2;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
">
Open Surprise 💌
</button>

</div>

`;

return;
}

const q = questions[currentQuestion];

document.getElementById("quiz").innerHTML = `

<h3 style="
font-size:32px;
margin-bottom:30px;
color:#333;
">
${q.question}
</h3>

<div style="display:grid;gap:18px">

${q.options.map(option => `

<button class="option-btn"
onclick="checkAnswer('${option}')">

${option}

</button>

`).join("")}

</div>

`;

}

function checkAnswer(option){

if(option === questions[currentQuestion].answer){

score++;

confetti({
particleCount:100,
spread:90,
origin:{y:0.6}
});

alert("Correct ❤️");

}else{

alert("Oops 😅");

}

currentQuestion++;

loadQuestion();

}

/* Final Celebration */

function celebrate(){

confetti({
particleCount:300,
spread:150,
origin:{y:0.6}
});

}

/* Popup */

function showPopup(){

document.getElementById("popup").style.display = "block";
document.getElementById("overlay").style.display = "block";

}

function closePopup(){

document.getElementById("popup").style.display = "none";
document.getElementById("overlay").style.display = "none";

}

loadQuestion();

</script>

</body>
</html>
